services:
  # --- n8n itself (runs the chatbot workflow) ---
  - type: web
    name: alpha-phoenix-n8n
    runtime: image
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    envVars:
      - key: N8N_HOST
        value: alpha-phoenix-n8n.onrender.com   # replace with your actual Render service hostname after first deploy
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: "5678"
      - key: WEBHOOK_URL
        value: https://alpha-phoenix-n8n.onrender.com/   # replace with your actual Render service URL after first deploy
      - key: N8N_ENCRYPTION_KEY
        sync: false        # set manually in Render dashboard - see README
      - key: GENERIC_TIMEZONE
        value: UTC
      - key: N8N_RUNNERS_ENABLED
        value: "true"

  # --- Static chat UI (index.html) ---
  - type: web
    name: alpha-phoenix-ui
    runtime: static
    staticPublishPath: .

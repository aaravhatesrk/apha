services:
  # --- n8n itself (runs the chatbot workflow) ---
  - type: web
    name: alpha-phoenix-n8n
    runtime: docker
    image:
      url: docker.io/n8nio/n8n:latest
    plan: starter          # Free plan has no persistent disk - workflows/credentials would reset on every restart. Starter (~$7/mo) is the minimum for real use.
    envVars:
      - key: N8N_HOST
        value: alpha-phoenix-n8n.onrender.com   # replace with your actual Render service hostname after first deploy
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: 5678
      - key: WEBHOOK_URL
        value: https://alpha-phoenix-n8n.onrender.com/   # replace with your actual Render service URL after first deploy
      - key: N8N_ENCRYPTION_KEY
        sync: false        # set manually in Render dashboard - see instructions
      - key: GENERIC_TIMEZONE
        value: UTC
      - key: N8N_RUNNERS_ENABLED
        value: "true"
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1

  # --- Static chat UI (chatbot.html) ---
  - type: web
    name: alpha-phoenix-ui
    runtime: static
    staticPublishPath: .
    buildCommand: ""
    envVars: []
